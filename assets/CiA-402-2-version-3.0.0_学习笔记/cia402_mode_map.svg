<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <rect width="100%" height="100%" fill="#111827"/>
  <text x="50" y="60" fill="#f9fafb" font-size="34" font-family="Arial, Microsoft YaHei">CiA 402 常见模式分类</text>
  <g font-family="Arial, Microsoft YaHei">
    <rect x="80" y="130" width="300" height="200" rx="24" fill="#1e293b" stroke="#60a5fa" stroke-width="3"/>
    <text x="230" y="175" fill="#93c5fd" font-size="26" text-anchor="middle">轮廓型</text>
    <text x="120" y="220" fill="#e5e7eb" font-size="20">Profile Position</text>
    <text x="120" y="255" fill="#e5e7eb" font-size="20">Profile Velocity</text>
    <text x="120" y="290" fill="#e5e7eb" font-size="20">Profile Torque</text>
    <rect x="430" y="130" width="300" height="200" rx="24" fill="#1e293b" stroke="#34d399" stroke-width="3"/>
    <text x="580" y="175" fill="#86efac" font-size="26" text-anchor="middle">同步型</text>
    <text x="470" y="220" fill="#e5e7eb" font-size="20">CSP</text>
    <text x="470" y="255" fill="#e5e7eb" font-size="20">CSV</text>
    <text x="470" y="290" fill="#e5e7eb" font-size="20">CST</text>
    <rect x="780" y="130" width="300" height="200" rx="24" fill="#1e293b" stroke="#f59e0b" stroke-width="3"/>
    <text x="930" y="175" fill="#fde68a" font-size="26" text-anchor="middle">基准建立</text>
    <text x="830" y="220" fill="#e5e7eb" font-size="20">Homing</text>
    <text x="830" y="255" fill="#e5e7eb" font-size="20">Home offset</text>
    <text x="830" y="290" fill="#e5e7eb" font-size="20">回零后坐标系</text>
    <rect x="1130" y="130" width="290" height="200" rx="24" fill="#1e293b" stroke="#f87171" stroke-width="3"/>
    <text x="1275" y="175" fill="#fca5a5" font-size="26" text-anchor="middle">辅助功能</text>
    <text x="1165" y="220" fill="#e5e7eb" font-size="20">Touch Probe</text>
    <text x="1165" y="255" fill="#e5e7eb" font-size="20">Torque limiting</text>
    <text x="1165" y="290" fill="#e5e7eb" font-size="20">Factor group</text>
  </g>
  <rect x="110" y="420" width="1280" height="360" rx="24" fill="#0b1220" stroke="#374151"/>
  <text x="140" y="470" fill="#f9fafb" font-size="28" font-family="Arial, Microsoft YaHei">初学者最容易记住的区别</text>
  <text x="150" y="530" fill="#93c5fd" font-size="22" font-family="Arial, Microsoft YaHei">轮廓型：驱动器帮你做加减速和轨迹平滑</text>
  <text x="150" y="580" fill="#86efac" font-size="22" font-family="Arial, Microsoft YaHei">同步型：控制器每周期下发目标，驱动器实时跟随</text>
  <text x="150" y="630" fill="#fde68a" font-size="22" font-family="Arial, Microsoft YaHei">Homing：不是运动控制本身，而是建立零点</text>
  <text x="150" y="680" fill="#fca5a5" font-size="22" font-family="Arial, Microsoft YaHei">Touch Probe：对外部触发事件做位置/时间锁存</text>
  <text x="150" y="730" fill="#e5e7eb" font-size="20" font-family="Arial, Microsoft YaHei">Factor group 负责把机械单位和编码器计数连接起来</text>
</svg>
