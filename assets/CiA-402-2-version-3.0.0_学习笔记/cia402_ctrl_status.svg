<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <rect width="100%" height="100%" fill="#0f172a"/>
  <text x="50" y="60" fill="#f9fafb" font-size="34" font-family="Arial, Microsoft YaHei">CiA 402 控制字 / 状态字速查图</text>
  <rect x="80" y="120" width="650" height="780" rx="24" fill="#111827" stroke="#374151"/>
  <text x="110" y="170" fill="#93c5fd" font-size="28" font-family="Arial, Microsoft YaHei">0x6040 控制字：你发给驱动器</text>
  <g fill="#e5e7eb" font-size="22" font-family="Arial, Microsoft YaHei">
    <text x="120" y="230">bit0  Switch on</text>
    <text x="120" y="275">bit1  Enable voltage</text>
    <text x="120" y="320">bit2  Quick stop</text>
    <text x="120" y="365">bit3  Enable operation</text>
    <text x="120" y="410">bit7  Fault reset</text>
    <text x="120" y="455">bit8  Halt</text>
    <text x="120" y="520" fill="#fde68a">记忆法：</text>
    <text x="120" y="565">先上电，再切换，再使能；故障时复位</text>
    <text x="120" y="615">Halt / Quick stop / Disable voltage</text>
    <text x="120" y="660">不是同一个东西</text>
  </g>
  <rect x="870" y="120" width="650" height="780" rx="24" fill="#111827" stroke="#374151"/>
  <text x="900" y="170" fill="#86efac" font-size="28" font-family="Arial, Microsoft YaHei">0x6041 状态字：驱动器反馈给你</text>
  <g fill="#e5e7eb" font-size="22" font-family="Arial, Microsoft YaHei">
    <text x="910" y="230">bit0  Ready to switch on</text>
    <text x="910" y="275">bit1  Switched on</text>
    <text x="910" y="320">bit2  Operation enabled</text>
    <text x="910" y="365">bit3  Fault</text>
    <text x="910" y="410">bit4  Voltage enabled</text>
    <text x="910" y="455">bit5  Quick stop</text>
    <text x="910" y="500">bit6  Switch on disabled</text>
    <text x="910" y="545">bit7  Warning</text>
    <text x="910" y="590">bit9  Remote</text>
    <text x="910" y="635">bit10 Target reached / mode change done</text>
    <text x="910" y="680">bit11 Internal limit active</text>
    <text x="910" y="735" fill="#fde68a">调试时先看：Fault、Remote、Operation enabled</text>
  </g>
</svg>
