<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <rect width="100%" height="100%" fill="#111827"/>
  <text x="50" y="60" fill="#f9fafb" font-size="34" font-family="Arial, Microsoft YaHei">ETG.6010 触发探针 / Homing 关系图</text>
  <rect x="90" y="140" width="360" height="160" rx="22" fill="#1e293b" stroke="#60a5fa" stroke-width="3"/>
  <text x="270" y="190" fill="#f9fafb" font-size="28" text-anchor="middle" font-family="Arial, Microsoft YaHei">Touch Probe</text>
  <text x="120" y="230" fill="#cbd5e1" font-size="20" font-family="Arial, Microsoft YaHei">触发边沿到来时锁存位置/时间</text>
  <text x="120" y="265" fill="#cbd5e1" font-size="20" font-family="Arial, Microsoft YaHei">适合高精度捕获和回零辅助</text>
  <rect x="555" y="140" width="390" height="160" rx="22" fill="#064e3b" stroke="#34d399" stroke-width="3"/>
  <text x="750" y="190" fill="#f9fafb" font-size="28" text-anchor="middle" font-family="Arial, Microsoft YaHei">Homing</text>
  <text x="585" y="230" fill="#d1fae5" font-size="20" font-family="Arial, Microsoft YaHei">建立机械零点 / 软件坐标系</text>
  <text x="585" y="265" fill="#d1fae5" font-size="20" font-family="Arial, Microsoft YaHei">可结合限位、index、touch probe</text>
  <rect x="1045" y="140" width="360" height="160" rx="22" fill="#1e293b" stroke="#f59e0b" stroke-width="3"/>
  <text x="1225" y="190" fill="#f9fafb" font-size="28" text-anchor="middle" font-family="Arial, Microsoft YaHei">0x60B8~0x60BD</text>
  <text x="1080" y="230" fill="#fde68a" font-size="20" font-family="Arial, Microsoft YaHei">触发功能、状态、位置、时间戳</text>
  <text x="1080" y="265" fill="#fde68a" font-size="20" font-family="Arial, Microsoft YaHei">第二路触发为可选扩展</text>
  <path d="M450 220 L550 220" stroke="#93c5fd" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M945 220 L1040 220" stroke="#86efac" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="100" y="360" width="1300" height="250" rx="24" fill="#0b1220" stroke="#374151"/>
  <text x="140" y="415" fill="#f9fafb" font-size="28" font-family="Arial, Microsoft YaHei">推荐理解顺序</text>
  <text x="150" y="470" fill="#93c5fd" font-size="22" font-family="Arial, Microsoft YaHei">先想：触发事件到了以后，我要锁存什么？</text>
  <text x="150" y="520" fill="#86efac" font-size="22" font-family="Arial, Microsoft YaHei">再想：这些锁存值如何帮助回零或精定位？</text>
  <text x="150" y="570" fill="#fde68a" font-size="22" font-family="Arial, Microsoft YaHei">最后再看对象号：0x60B8、0x60B9、0x60BA...0x60BD</text>
  <rect x="100" y="640" width="1300" height="200" rx="24" fill="#111827" stroke="#374151"/>
  <text x="140" y="695" fill="#f9fafb" font-size="28" font-family="Arial, Microsoft YaHei">核心一句话</text>
  <text x="150" y="748" fill="#e5e7eb" font-size="22" font-family="Arial, Microsoft YaHei">Touch Probe 不是“普通输入”，而是“事件发生时的位置/时间记录器”</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#cbd5e1"/>
    </marker>
  </defs>
</svg>
