  <rect width="100%" height="100%" fill="#ffffff"/>
  
    <text x="48" y="48" class="title">初始化发送序列节选：L2_Cdd_BE13.c</text>
    <rect x="48" y="76" width="1504" height="158" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="8"/>
    <text x="64" y="112" class="code">InitState1: clear INT1/LSDxF/VLV_PMDF/SVFLT/VREG_FLG</text>
<text x="64" y="139" class="code">InitState1: write VCCA_CLCK, PMDCLK, WSCFG1, VLVCLK, VLVEN=0</text>
<text x="64" y="166" class="code">InitState2: write LSD3_4K/LSD9_10K/LSD2_11K/LSD5_8K</text>
<text x="64" y="193" class="code">InitState2: write HSDCFG, CAN_CFG, PMDCFG, SVCFG_BIST, ABIST_DIS</text>
<text x="64" y="220" class="code">InitState2: write VLVEN=0x1000 and WDSEED=0x5A5A</text>
<text x="64" y="247" class="code">InitState3: read back key configuration and keep VLVEN=0x1000</text>
    
