      .tiny{font:400 13px Consolas, "Microsoft YaHei", monospace; fill:#334155}
      .code{font:400 16px Consolas, "Microsoft YaHei", monospace; fill:#0f172a}
      .wire{stroke:#1f2937; stroke-width:2.2; fill:none; marker-end:url(#arrow)}
      .dash{stroke:#64748b; stroke-width:2; fill:none; stroke-dasharray:7 6; marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
      <text x="56" y="58" class="title">当前工程的 AUTOSAR / CDD 集成关系</text>
      <text x="56" y="92" class="sub">BE13 不是标准 MCAL 模块，配置主要落在 CDD、RTE/SWC arxml、SPI/DIO/DEM 依赖上。</text>
      
  <rect x="90" y="170" width="360" height="150" class="blue"/>
  <text x="108" y="204" class="label">CDD_BE13 SWC arxml</text>
  <text x="108" y="234" class="small">RE_CDD_BE13_Init</text>
<text x="108" y="258" class="small">RE_CDD_BE13_1ms</text>
<text x="108" y="282" class="small">RE_CDD_BE13_10ms</text>
<text x="108" y="306" class="small">TimingEvent: 1ms / 10ms</text>
  
      
  <rect x="560" y="170" width="360" height="150" class="green"/>
  <text x="578" y="204" class="label">ASW SWC wrapper</text>
  <text x="578" y="234" class="small">ASW/SWC/CDD_SWC/CDD_BE13</text>
