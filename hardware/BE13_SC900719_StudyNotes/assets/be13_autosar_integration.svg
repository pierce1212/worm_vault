  <rect x="250" y="455" width="330" height="150" class="amber"/>
  <text x="268" y="489" class="label">MCAL 依赖</text>
  <text x="268" y="519" class="small">SpiChannel_BE13</text>
<text x="268" y="543" class="small">SpiSequence_BE13</text>
<text x="268" y="567" class="small">DioChannel_PTE22_BIST_BE13</text>
<text x="268" y="591" class="small">Port/clock/pin mux</text>
  
      
  <rect x="700" y="455" width="330" height="150" class="red"/>
  <text x="718" y="489" class="label">DEM/RTE 依赖</text>
  <text x="718" y="519" class="small">Dem_SetEventStatus</text>
<text x="718" y="543" class="small">DTC_0x4140xx</text>
<text x="718" y="567" class="small">Rte_CDD_BE13.h</text>
<text x="718" y="591" class="small">Interface_ASample.h</text>
  
      <path d="M450,245 L560,245" class="wire"/>
      <path d="M920,245 L1030,245" class="wire"/>
      <path d="M1190,320 L415,455" class="wire"/>
      <path d="M1190,320 L865,455" class="wire"/>
      <text x="92" y="720" class="small">配置检查顺序：CDD 寄存器参数 -> SPI 外部缓冲/序列 -> BIST/控制 DIO -> DEM event -> RTE runnable 是否真正调用 CddBE13_L2_*。</text>
      
