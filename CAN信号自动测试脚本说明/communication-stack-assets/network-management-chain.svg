<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <defs>
    <style>
      .title{font:700 26px Arial, sans-serif;fill:#1f2937}
      .box{rx:8;fill:#f8fafc;stroke:#334155;stroke-width:2}
      .mode{fill:#eef2ff;stroke:#4f46e5}
      .nm{fill:#f0fdf4;stroke:#16a34a}
      .label{font:600 17px Arial, sans-serif;fill:#111827}
      .small{font:13px Arial, sans-serif;fill:#475569}
      .arrow{stroke:#475569;stroke-width:2.4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1180" height="560" fill="#fff"/>
  <text x="36" y="46" class="title">Network Management and Communication Mode Control</text>
  <rect x="55" y="105" width="150" height="70" class="box"/><text x="85" y="135" class="label">SWC/EcuM</text><text x="74" y="158" class="small">request or wakeup</text>
  <rect x="250" y="105" width="150" height="70" class="box mode"/><text x="302" y="135" class="label">ComM</text><text x="276" y="158" class="small">Full / Silent / No</text>
  <rect x="445" y="105" width="150" height="70" class="box mode"/><text x="493" y="135" class="label">CanSM</text><text x="468" y="158" class="small">bus state machine</text>
  <rect x="640" y="105" width="150" height="70" class="box"/><text x="684" y="135" class="label">CanIf</text><text x="660" y="158" class="small">controller mode</text>
  <rect x="835" y="105" width="150" height="70" class="box nm"/><text x="880" y="135" class="label">CanNm</text><text x="852" y="158" class="small">NM PDU state</text>
  <rect x="1030" y="105" width="100" height="70" class="box nm"/><text x="1064" y="145" class="label">Nm</text>
  <line x1="205" y1="140" x2="250" y2="140" class="arrow"/>
  <line x1="400" y1="140" x2="445" y2="140" class="arrow"/>
  <line x1="595" y1="140" x2="640" y2="140" class="arrow"/>
  <line x1="790" y1="140" x2="835" y2="140" class="arrow"/>
  <line x1="985" y1="140" x2="1030" y2="140" class="arrow"/>

  <text x="75" y="240" class="label">CanNm state flow</text>
  <rect x="75" y="275" width="170" height="58" class="box nm"/><text x="110" y="310" class="small">Bus Sleep</text>
  <rect x="295" y="275" width="170" height="58" class="box nm"/><text x="323" y="310" class="small">Repeat Message</text>
  <rect x="515" y="275" width="170" height="58" class="box nm"/><text x="548" y="310" class="small">Normal Operation</text>
  <rect x="735" y="275" width="170" height="58" class="box nm"/><text x="775" y="310" class="small">Ready Sleep</text>
  <rect x="955" y="275" width="170" height="58" class="box nm"/><text x="986" y="310" class="small">Prepare Sleep</text>
  <line x1="245" y1="304" x2="295" y2="304" class="arrow"/>
  <line x1="465" y1="304" x2="515" y2="304" class="arrow"/>
  <line x1="685" y1="304" x2="735" y2="304" class="arrow"/>
  <line x1="905" y1="304" x2="955" y2="304" class="arrow"/>

  <rect x="75" y="405" width="1050" height="95" class="box" fill="#fafafa"/>
  <text x="105" y="438" class="label">Key code points</text>
  <text x="105" y="468" class="small">ComM_RequestComMode() -> CanSM_RequestComMode() -> CanIf_SetControllerMode()</text>
  <text x="105" y="493" class="small">CanNm_RxIndication() / CanNm_TxConfirmation() -> Nm_* callbacks -> ComM_Nm_* callbacks</text>
</svg>
