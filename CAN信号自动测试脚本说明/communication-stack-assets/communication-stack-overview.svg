<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <style>
      .title{font:700 28px Arial, sans-serif;fill:#1f2937}
      .label{font:600 18px Arial, sans-serif;fill:#111827}
      .small{font:14px Arial, sans-serif;fill:#374151}
      .box{rx:8;fill:#f8fafc;stroke:#334155;stroke-width:2}
      .service{fill:#ecfeff;stroke:#0891b2}
      .ecu{fill:#f0fdf4;stroke:#16a34a}
      .mcal{fill:#fff7ed;stroke:#ea580c}
      .arrow{stroke:#475569;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1100" height="620" fill="#ffffff"/>
  <text x="40" y="48" class="title">AUTOSAR Communication Stack Overview</text>

  <rect x="70" y="90" width="960" height="95" class="box" fill="#f9fafb"/>
  <text x="95" y="125" class="label">Application / SWC</text>
  <text x="95" y="155" class="small">Com_SendSignal, diagnostic jobs, mode requests, time consumers</text>

  <rect x="70" y="220" width="960" height="145" class="box service"/>
  <text x="95" y="255" class="label">Service Layer</text>
  <rect x="95" y="280" width="120" height="50" class="box service"/><text x="132" y="312" class="small">Com</text>
  <rect x="240" y="280" width="120" height="50" class="box service"/><text x="278" y="312" class="small">Dcm</text>
  <rect x="385" y="280" width="120" height="50" class="box service"/><text x="422" y="312" class="small">PduR</text>
  <rect x="530" y="280" width="120" height="50" class="box service"/><text x="565" y="312" class="small">IpduM</text>
  <rect x="675" y="280" width="120" height="50" class="box service"/><text x="712" y="312" class="small">ComM</text>
  <rect x="820" y="280" width="120" height="50" class="box service"/><text x="853" y="312" class="small">StbM</text>

  <rect x="70" y="400" width="960" height="95" class="box ecu"/>
  <text x="95" y="435" class="label">ECU Abstraction</text>
  <text x="95" y="465" class="small">CanIf, CanTp, CanNm, CanSM, CanTSyn, LinIf, EthIf</text>

  <rect x="70" y="530" width="960" height="55" class="box mcal"/>
  <text x="95" y="565" class="label">MCAL / Driver</text>
  <text x="260" y="565" class="small">CAN Driver, LIN Driver, Ethernet Driver, controller hardware</text>

  <line x1="550" y1="185" x2="550" y2="220" class="arrow"/>
  <line x1="550" y1="365" x2="550" y2="400" class="arrow"/>
  <line x1="550" y1="495" x2="550" y2="530" class="arrow"/>
</svg>
