<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <defs>
    <style>
      .title{font:700 26px Arial, sans-serif;fill:#1f2937}
      .box{rx:8;fill:#f8fafc;stroke:#334155;stroke-width:2}
      .sync{fill:#f0fdfa;stroke:#0f766e}
      .time{fill:#fff7ed;stroke:#ea580c}
      .label{font:600 17px Arial, sans-serif;fill:#111827}
      .small{font:13px Arial, sans-serif;fill:#475569}
      .arrow{stroke:#475569;stroke-width:2.4;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="980" height="430" fill="#fff"/>
  <text x="36" y="46" class="title">CAN Time Synchronization</text>
  <rect x="65" y="120" width="150" height="75" class="box"/><text x="97" y="150" class="label">CAN Bus</text><text x="84" y="174" class="small">Sync / FollowUp</text>
  <rect x="270" y="120" width="155" height="75" class="box"/><text x="310" y="150" class="label">CanIf</text><text x="293" y="174" class="small">RxIndication</text>
  <rect x="480" y="120" width="155" height="75" class="box sync"/><text x="520" y="150" class="label">CanTSyn</text><text x="499" y="174" class="small">time sync logic</text>
  <rect x="690" y="120" width="155" height="75" class="box time"/><text x="732" y="150" class="label">StbM</text><text x="707" y="174" class="small">time base manager</text>
  <line x1="215" y1="158" x2="270" y2="158" class="arrow"/>
  <line x1="425" y1="158" x2="480" y2="158" class="arrow"/>
  <line x1="635" y1="158" x2="690" y2="158" class="arrow"/>
  <rect x="165" y="280" width="650" height="85" class="box" fill="#fafafa"/>
  <text x="195" y="313" class="label">Idea</text>
  <text x="195" y="343" class="small">CanTSyn interprets time sync frames; StbM provides a stable global time base to consumers.</text>
</svg>
