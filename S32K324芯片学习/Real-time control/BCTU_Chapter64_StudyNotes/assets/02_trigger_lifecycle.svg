<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f7fafc"/>
  <text x="40" y="46" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#1f2933" text-anchor="start"><tspan x="40" dy="0">一次BCTU触发的生命周期</tspan></text>
  
  <g filter="url(#shadow)">
    <g>
    <rect x="60" y="130" width="180" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="60" y="130" width="7" height="90" rx="8" fill="#0891b2"/>
    <text x="150" y="167" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="150" dy="0">1.触发为1</tspan></text>
    <text x="150" y="199" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="150" dy="0">eMIOS/TRGMUX</tspan><tspan x="150" dy="18">或SFTRGR写1</tspan></text>
  </g>
    <g>
    <rect x="300" y="130" width="190" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="300" y="130" width="7" height="90" rx="8" fill="#2563eb"/>
    <text x="395" y="167" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="395" dy="0">2.锁存</tspan></text>
    <text x="395" y="199" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="395" dy="0">TRG_FLAG=1</tspan><tspan x="395" dy="18">触发保持pending</tspan></text>
  </g>
    <g>
    <rect x="550" y="130" width="230" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="550" y="130" width="7" height="90" rx="8" fill="#7c3aed"/>
    <text x="665" y="167" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="665" dy="0">3.优先级仲裁</tspan></text>
    <text x="665" y="199" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="665" dy="0">同一ADC：编号越小</tspan><tspan x="665" dy="18">优先级越高</tspan></text>
  </g>
    <g>
    <rect x="845" y="130" width="210" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="845" y="130" width="7" height="90" rx="8" fill="#16a34a"/>
    <text x="950" y="167" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="950" dy="0">4.发ADC命令</tspan></text>
    <text x="950" y="199" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="950" dy="0">约4个BCTUclock</tspan><tspan x="950" dy="18">ADCbusy后续约3个</tspan></text>
  </g>
    <g>
    <rect x="1120" y="130" width="230" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="1120" y="130" width="7" height="90" rx="8" fill="#d97706"/>
    <text x="1235" y="167" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="1235" dy="0">5.清触发</tspan></text>
    <text x="1235" y="199" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="1235" dy="0">单次转换开始即清</tspan><tspan x="1235" dy="18">CL到最后一次开始清</tspan></text>
  </g>
    <g>
    <rect x="1120" y="340" width="230" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="1120" y="340" width="7" height="90" rx="8" fill="#dc2626"/>
    <text x="1235" y="377" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="1235" dy="0">6.结果返回</tspan></text>
    <text x="1235" y="409" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="1235" dy="0">ADCpush+data</tspan><tspan x="1235" dy="18">写ADCDR或FIFO</tspan></text>
  </g>
    <g>
    <rect x="845" y="340" width="210" height="90" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="1.4"/>
    <rect x="845" y="340" width="7" height="90" rx="8" fill="#2563eb"/>
    <text x="950" y="377" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="950" dy="0">7.软件处理</tspan></text>
    <text x="950" y="409" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#52616b" text-anchor="middle"><tspan x="950" dy="0">CPU读结果</tspan><tspan x="950" dy="18">或DMA/IRQ通知</tspan></text>
  </g>
  </g>
  <g>
    <line x1="240" y1="175" x2="300" y2="175" stroke="#2563eb" stroke-width="2.5"  marker-end="url(#arrow)"/>
    
  </g>
  <g>
    <line x1="490" y1="175" x2="550" y2="175" stroke="#2563eb" stroke-width="2.5"  marker-end="url(#arrow)"/>
    
  </g>
  <g>
    <line x1="780" y1="175" x2="845" y2="175" stroke="#2563eb" stroke-width="2.5"  marker-end="url(#arrow)"/>
    
  </g>
  <g>
    <line x1="1055" y1="175" x2="1120" y2="175" stroke="#2563eb" stroke-width="2.5"  marker-end="url(#arrow)"/>
    
  </g>
  <g>
    <line x1="1235" y1="220" x2="1235" y2="340" stroke="#2563eb" stroke-width="2.5"  marker-end="url(#arrow)"/>
    
  </g>
  <g>
    <line x1="1120" y1="385" x2="1055" y2="385" stroke="#2563eb" stroke-width="2.5"  marker-end="url(#arrow)"/>
    
  </g>
  <path d="M 655 235 C 655 315 1045 315 1045 385" fill="none" stroke="#9fb3c8" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="70" y="555" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#1f2933" text-anchor="start"><tspan x="70" dy="0">关键边界条件</tspan></text>
  <g>
    <rect x="70" y="590" width="213" height="32" rx="16" fill="#e0f2fe" stroke="#0891b2"/>
    <text x="176.5" y="611" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="176.5" dy="0">触发输入是level-sensitive</tspan></text>
  </g>
  <g>
    <rect x="345" y="590" width="96" height="32" rx="16" fill="#fee2e2" stroke="#ef4444"/>
    <text x="393" y="611" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="393" dy="0">重复置位会被忽略</tspan></text>
  </g>
  <g>
    <rect x="570" y="590" width="123" height="32" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="631.5" y="611" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="631.5" dy="0">清除同时置位：置位优先</tspan></text>
  </g>
  <g>
    <rect x="845" y="590" width="222" height="32" rx="16" fill="#f3e8ff" stroke="#a855f7"/>
    <text x="956" y="611" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="956" dy="0">TRG_FLAG=1时不要改TRGCFG</tspan></text>
  </g>
  <g>
    <rect x="1190" y="590" width="204" height="32" rx="16" fill="#dcfce7" stroke="#22c55e"/>
    <text x="1292" y="611" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#1f2933" text-anchor="middle"><tspan x="1292" dy="0">TRGMUX改完后清TRG_FLAG</tspan></text>
  </g>

</svg>