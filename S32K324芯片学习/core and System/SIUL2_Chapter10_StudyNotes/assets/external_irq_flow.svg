<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 34px Arial, sans-serif; fill:#111827}
      .sub{font:400 20px Arial, sans-serif; fill:#475569}
      .box{fill:#f8fafc; stroke:#334155; stroke-width:2; rx:8}
      .box2{fill:#eef6ff; stroke:#2563eb; stroke-width:2; rx:8}
      .box3{fill:#fff7ed; stroke:#ea580c; stroke-width:2; rx:8}
      .box4{fill:#f0fdf4; stroke:#16a34a; stroke-width:2; rx:8}
      .box5{fill:#fef2f2; stroke:#dc2626; stroke-width:2; rx:8}
      .label{font:600 20px Arial, sans-serif; fill:#111827}
      .small{font:400 16px Arial, sans-serif; fill:#334155}
      .tiny{font:400 13px Consolas, monospace; fill:#334155}
      .code{font:400 16px Consolas, monospace; fill:#0f172a}
      .wire{stroke:#334155; stroke-width:2.2; fill:none; marker-end:url(#arrow)}
      .dash{stroke:#64748b; stroke-width:2; fill:none; stroke-dasharray:8 6; marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
      <text x="56" y="58" class="title">外部中断 / DMA 请求路径</text>
      <text x="56" y="92" class="sub">EIRQ0..31 由 pad 输入进入 SIUL2，可选择中断或 DMA 请求。</text>
      
  <rect x="80" y="230" width="230" height="110" class="box3"/>
  <text x="98" y="264" class="label">Pad 输入</text>
  <text x="98" y="294" class="small">MSCR: IBE=1</text>
<text x="98" y="318" class="small">OBE=0</text>
  
      
  <rect x="420" y="170" width="270" height="110" class="box2"/>
  <text x="438" y="204" class="label">边沿选择</text>
  <text x="438" y="234" class="small">IREER0: rising</text>
<text x="438" y="258" class="small">IFEER0: falling</text>
  
      
  <rect x="420" y="370" width="270" height="130" class="box2"/>
  <text x="438" y="404" class="label">数字滤波</text>
  <text x="438" y="434" class="small">IFER0 enable</text>
<text x="438" y="458" class="small">IFMCRn max count</text>
<text x="438" y="482" class="small">IFCPR prescaler</text>
  
      
  <rect x="810" y="260" width="270" height="120" class="box"/>
  <text x="828" y="294" class="label">状态与使能</text>
  <text x="828" y="324" class="small">DISR0: flag</text>
<text x="828" y="348" class="small">DIRER0: enable</text>
  
      
  <rect x="1190" y="170" width="300" height="120" class="box5"/>
  <text x="1208" y="204" class="label">Interrupt</text>
  <text x="1208" y="234" class="small">进入中断控制器</text>
<text x="1208" y="258" class="small">0..31 分 4 组</text>
  
      
  <rect x="1190" y="430" width="300" height="120" class="box4"/>
  <text x="1208" y="464" class="label">DMA request</text>
  <text x="1208" y="494" class="small">DIRSR0 选择 DMA</text>
<text x="1208" y="518" class="small">EIRQ0..15 可 DMA</text>
  
      <path d="M310,285 L420,225" class="wire"/>
      <path d="M310,285 L420,435" class="wire"/>
      <path d="M690,225 L810,320" class="wire"/>
      <path d="M690,435 L810,320" class="wire"/>
      <path d="M1080,320 L1190,230" class="wire"/>
      <path d="M1080,320 L1190,490" class="wire"/>
      <text x="96" y="700" class="small">初始化顺序重点：先配置滤波和边沿，mask 中断，配置 MSCR 输入属性，清 DISR0 flag，最后使能 DIRER0。</text>
      <text x="96" y="730" class="small">手册提醒：若打开 IBE，pad 必须被主动驱动，否则 IO 状态可能不确定。</text>
      
</svg>